<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#4a067d">
  <title>專屬數字藝術創作</title>
  <style>
    html,body{margin:0;min-height:100%;background:#121120;color:#fff}
    body{font-family:"Noto Serif SC","Songti SC",serif}
    .art-shell-top{position:fixed;top:0;left:0;right:0;z-index:20;height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(18,17,32,.84);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
    .art-shell-top b{color:#f1c25a;text-decoration:none;font-size:13px;letter-spacing:.08em}
    .art-shell-top span{color:#d9c9ec;font-size:12px}
    #art-app{padding-top:42px}
  </style>
</head>
<body>
  <div class="art-shell-top">
    <b>專屬數字藝術創作</b>
    <span>Personal Digital Art Commission</span>
  </div>
  <main id="art-app"></main>
  <script src="assets/art-commission/art-commission.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function(){
      if(window.ART && window.ART.renderStandalone) window.ART.renderStandalone();
    });
  </script>
</body>
</html>
